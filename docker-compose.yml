services:
  db:
    image: postgres:16
    container_name: trend-korea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trend_korea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - trend_korea_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trend_korea"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build: docker/elasticsearch
    container_name: trend-korea-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - trend_korea_es:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  trend_korea_postgres:
  trend_korea_es:
